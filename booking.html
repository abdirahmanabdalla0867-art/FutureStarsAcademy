<section>

<h2 style="text-align:center;">Player Enrollment Form</h2>

<form class="booking-form">

<fieldset>

<legend>Personal Information</legend>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number" required>

<label>Age Group</label>

<select required>

<option value="">Select Age Group</option>
<option>Under 10</option>
<option>Under 13</option>
<option>Under 16</option>
<option>Under 19</option>

</select>

</fieldset>

<fieldset>

<legend>Gender</legend>

<label>
<input type="radio" name="gender" required>
Male
</label>

<label>
<input type="radio" name="gender">
Female
</label>

</fieldset>

<fieldset>

<legend>Preferred Position</legend>

<label>
<input type="checkbox">
Goalkeeper
</label>

<label>
<input type="checkbox">
Defender
</label>

<label>
<input type="checkbox">
Midfielder
</label>

<label>
<input type="checkbox">
Forward
</label>

</fieldset>

<fieldset>

<legend>Comments</legend>

<textarea rows="6" placeholder="Write your message here..."></textarea>

</fieldset>

<input type="submit" value="Enroll Now" class="btn">

</form>

</section>
